<!doctype html>
<html lang="en">
<head>

  <style>
    :root{--ink:#111827;--muted:#667085;--paper:#fffaf3;--line:#eadfce;--teal:#0f766e;--teal-dark:#115e59;--orange:#ea580c;--shadow:0 24px 70px rgba(17,24,39,.12);--max:900px}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#fffaf3 0%,#f7efe2 100%);color:var(--ink);font-family:Manrope,Arial,sans-serif;line-height:1.55}.wrap{width:min(var(--max),calc(100% - 40px));margin:auto}.hero{min-height:100vh;display:grid;place-items:center;padding:60px 0}.card{background:#fff;border:1px solid var(--line);border-radius:32px;box-shadow:var(--shadow);padding:42px}h1{font-family:Calistoga,Georgia,serif;font-size:clamp(3rem,7vw,5.6rem);font-weight:400;line-height:1;margin:0}p{font-size:1.1rem;color:var(--muted);font-weight:650}.btns{display:flex;gap:12px;flex-wrap:wrap;margin-top:28px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:50px;padding:14px 20px;border-radius:999px;font-weight:850;border:1px solid transparent;text-decoration:none}.btn-primary{background:var(--teal);color:#fff}.btn-secondary{background:#fff;color:var(--ink);border-color:var(--line)}.mono{font-family:'JetBrains Mono',monospace;color:var(--teal-dark);font-weight:900}@media(max-width:560px){.wrap{width:min(var(--max),calc(100% - 20px))}.card{padding:24px}.btn{width:100%}}
  </style>
</head>

      <p>Thanks — YellowMarket received your audit request. If the website or contact detail needs clarification, we will reply directly. If it is urgent, call (202) 773-7868.</p>
      <div class="btns"><a class="btn btn-primary" href="/">Back to YellowMarket</a><a class="btn btn-secondary" href="tel:+12027737868">Call now</a></div>
    </div>
  </main>
</body>
</html>
